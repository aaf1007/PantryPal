spring.application.name=pantry-pal
spring.config.import=optional:file:.env[.properties]

# In-memory H2 for development (no external DB required).
# Switch to PostgreSQL by setting spring.datasource.url (and username/password) when ready.
spring.datasource.url=jdbc:h2:mem:pantrydb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
server.port=${PORT:8080}    

gemini.apiKey=${GEMINI_API_KEY:}
gemini.model=${GEMINI_MODEL:gemini-2.5-flash}

usda.apiKey=${USDA_API_KEY:}
