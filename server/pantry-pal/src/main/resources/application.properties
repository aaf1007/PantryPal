spring.application.name=pantry-pal
spring.config.import=optional:file:.env[.properties]


spring.datasource.url=jdbc:postgresql://postgres:${DB_PASSWORD}@postgres.railway.internal:5432/railway
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.datasource.driver-class-name=org.postgresql.Driver 

server.port=${PORT:8080}    
app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*,https://*.vercel.app}

gemini.apiKey=${GEMINI_API_KEY:}
gemini.model=${GEMINI_MODEL:gemini-2.5-flash}

usda.apiKey=${USDA_API_KEY:}
